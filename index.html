<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Listing Lab</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121936;
      --line: #24305e;
      --text: #eef2ff;
      --muted: #9fb0e0;
      --accent: #6ea8fe;
      --accent-2: #8ef0c1;
      --danger: #ff8f8f;
      --warn: #ffd27d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1430 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent-2);
      font-size: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.02);
    }
    h1 {
      font-size: clamp(30px, 5vw, 48px);
      margin: 0 0 10px;
      line-height: 1.15;
    }
    .sub {
      color: var(--muted);
      line-height: 1.7;
      max-width: 900px;
      margin-bottom: 24px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: rgba(18, 25, 54, 0.88);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 14px;
    }
    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0a1127;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.6;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110,168,254,0.16);
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .primary {
      background: linear-gradient(135deg, var(--accent), #5e8cff);
      color: white;
    }
    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .ok { color: var(--accent-2); }
    .warn { color: var(--warn); }
    .danger { color: var(--danger); }

    .result-block {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #0a1127;
      border: 1px solid var(--line);
    }
    .result-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-2);
      margin-bottom: 10px;
    }
    .result-content {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 14px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      margin: 0 6px 8px 0;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">실효성 검증용 1호기</div>
    <h1>Auto Listing Lab</h1>
    <p class="sub">
      한글 상품 정보만 넣으면 Amazon / Etsy용 영문 상품 제목, 핵심 포인트, 설명문, 태그를 자동 생성합니다.
    </p>

    <div class="layout">
      <section class="card">
        <div class="section-title">상품 정보 입력</div>

        <div class="field">
          <label class="label" for="productName">상품명 *</label>
          <input id="productName" type="text" placeholder="예: 스테인리스 보온 텀블러" />
        </div>

        <div class="field">
          <label class="label" for="platform">대상 플랫폼 *</label>
          <select id="platform">
            <option value="Amazon">Amazon</option>
            <option value="Etsy">Etsy</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="features">핵심 특징 3개 이상 *</label>
          <textarea id="features" placeholder="예: 보온/보냉 유지, 누수 방지 뚜껑, 차량 컵홀더 호환"></textarea>
        </div>

        <div class="field">
          <label class="label" for="material">소재</label>
          <input id="material" type="text" placeholder="예: 스테인리스 스틸" />
        </div>

        <div class="field">
          <label class="label" for="color">색상</label>
          <input id="color" type="text" placeholder="예: 블랙" />
        </div>

        <div class="field">
          <label class="label" for="size">크기</label>
          <input id="size" type="text" placeholder="예: 500ml / 17oz" />
        </div>

        <div class="field">
          <label class="label" for="targetCustomer">타겟 고객</label>
          <input id="targetCustomer" type="text" placeholder="예: 출퇴근 직장인, 학생, 선물 구매자" />
        </div>

        <div class="field">
          <label class="label" for="bannedTerms">금지 표현</label>
          <input id="bannedTerms" type="text" placeholder="예: best, guaranteed, medical, eco-friendly" />
        </div>

        <div class="row">
          <button class="primary" id="generateBtn">리스팅 생성하기</button>
          <button class="secondary" id="sampleBtn">예시 넣기</button>
          <button class="secondary" id="clearBtn">초기화</button>
        </div>

        <div class="status" id="statusText">상태: <span class="ok">정상</span> · 입력 대기</div>
      </section>

      <section class="card">
        <div class="section-title">생성 결과</div>

        <div class="result-block">
          <div class="result-title">영문 제목 3개</div>
          <div class="result-content" id="titlesBox">아직 결과가 없습니다.</div>
        </div>

        <div class="result-block">
          <div class="result-title">핵심 포인트 5개</div>
          <div class="result-content" id="bulletsBox">아직 결과가 없습니다.</div>
        </div>

        <div class="result-block">
          <div class="result-title">설명문</div>
          <div class="result-content" id="descriptionBox">아직 결과가 없습니다.</div>
        </div>

        <div class="result-block">
          <div class="result-title">태그 10개</div>
          <div class="result-content" id="tagsBox">아직 결과가 없습니다.</div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:20px;">
      <div class="pill">Amazon</div>
      <div class="pill">Etsy</div>
      <div class="pill">영문 제목</div>
      <div class="pill">포인트</div>
      <div class="pill">설명문</div>
      <div class="pill">태그</div>
    </section>
  </div>

  <script>
    const API_URL = "https://auto-eth-api.cogurrl.workers.dev/";

    const productName = document.getElementById("productName");
    const platform = document.getElementById("platform");
    const features = document.getElementById("features");
    const material = document.getElementById("material");
    const color = document.getElementById("color");
    const size = document.getElementById("size");
    const targetCustomer = document.getElementById("targetCustomer");
    const bannedTerms = document.getElementById("bannedTerms");

    const generateBtn = document.getElementById("generateBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusText = document.getElementById("statusText");

    const titlesBox = document.getElementById("titlesBox");
    const bulletsBox = document.getElementById("bulletsBox");
    const descriptionBox = document.getElementById("descriptionBox");
    const tagsBox = document.getElementById("tagsBox");

    function resetResults() {
      titlesBox.textContent = "아직 결과가 없습니다.";
      bulletsBox.textContent = "아직 결과가 없습니다.";
      descriptionBox.textContent = "아직 결과가 없습니다.";
      tagsBox.textContent = "아직 결과가 없습니다.";
    }

    function formatArray(items) {
      if (!Array.isArray(items) || items.length === 0) return "결과가 없습니다.";
      return items.map((item, idx) => `${idx + 1}. ${item}`).join("\n");
    }

    generateBtn.addEventListener("click", async () => {
      const payload = {
        productName: productName.value.trim(),
        platform: platform.value.trim(),
        features: features.value.trim(),
        material: material.value.trim(),
        color: color.value.trim(),
        size: size.value.trim(),
        targetCustomer: targetCustomer.value.trim(),
        bannedTerms: bannedTerms.value.trim(),
      };

      if (!payload.productName || !payload.platform || !payload.features) {
        statusText.innerHTML = '상태: <span class="danger">입력 부족</span> · 상품명, 플랫폼, 핵심 특징은 필수';
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "생성 중...";
      statusText.innerHTML = '상태: <span class="warn">처리 중</span> · AI 리스팅 생성 요청';
      titlesBox.textContent = "생성 중...";
      bulletsBox.textContent = "생성 중...";
      descriptionBox.textContent = "생성 중...";
      tagsBox.textContent = "생성 중...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.detail ? JSON.stringify(data.detail) : (data.error || "리스팅 생성 실패"));
        }

        const result = data.result || {};

        titlesBox.textContent = formatArray(result.titles);
        bulletsBox.textContent = formatArray(result.bullets);
        descriptionBox.textContent = result.description || "결과가 없습니다.";
        tagsBox.textContent = Array.isArray(result.tags) ? result.tags.join(", ") : "결과가 없습니다.";

        statusText.innerHTML = '상태: <span class="ok">완료</span> · 실제 리스팅 생성 성공';
      } catch (error) {
        titlesBox.textContent = "오류가 발생했습니다.";
        bulletsBox.textContent = error.message;
        descriptionBox.textContent = "";
        tagsBox.textContent = "";
        statusText.innerHTML = '상태: <span class="danger">오류</span> · API 호출 실패';
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "리스팅 생성하기";
      }
    });

    sampleBtn.addEventListener("click", () => {
      productName.value = "스테인리스 보온 텀블러";
      platform.value = "Amazon";
      features.value = "보온/보냉 유지, 누수 방지 뚜껑, 차량 컵홀더 호환";
      material.value = "스테인리스 스틸";
      color.value = "블랙";
      size.value = "500ml / 17oz";
      targetCustomer.value = "출퇴근 직장인, 학생, 선물 구매자";
      bannedTerms.value = "best, guaranteed, medical";
      resetResults();
      statusText.innerHTML = '상태: <span class="ok">예시 준비 완료</span>';
    });

    clearBtn.addEventListener("click", () => {
      productName.value = "";
      platform.value = "Amazon";
      features.value = "";
      material.value = "";
      color.value = "";
      size.value = "";
      targetCustomer.value = "";
      bannedTerms.value = "";
      resetResults();
      statusText.innerHTML = '상태: <span class="ok">정상</span> · 입력 대기';
    });
  </script>
</body>
</html>
